<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인생역전! 로또 번호 추첨기</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <button id="theme-toggle" aria-label="테마 전환">
        <i class="fas fa-moon"></i>
    </button>

    <div class="main-wrapper">
        <!-- 로또 추첨기 섹션 -->
        <div class="container">
            <h1>🍀 로또 번호 추첨기</h1>
            <div class="numbers-container">
                <div class="number-circle">?</div>
                <div class="number-circle">?</div>
                <div class="number-circle">?</div>
                <div class="number-circle">?</div>
                <div class="number-circle">?</div>
                <div class="number-circle">?</div>
            </div>
            <button id="generate-btn">번호 추첨하기</button>
        </div>

        <!-- 제휴 문의 섹션 -->
        <div class="contact-container">
            <h2>🤝 제휴 및 비즈니스 문의</h2>
            <p>협업이나 광고 제안은 아래 폼을 통해 남겨주세요.</p>
            <form action="https://formspree.io/f/xqegylep" method="POST" id="contact-form">
                <div class="form-group">
                    <label for="name">성함/업체명</label>
                    <input type="text" id="name" name="name" placeholder="이름을 입력하세요" required>
                </div>
                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" id="email" name="_replyto" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" rows="4" placeholder="문의 내용을 입력해 주세요" required></textarea>
                </div>
                <input type="text" name="_gotcha" style="display:none">
                <button type="submit" id="submit-btn">문의 보내기</button>
            </form>
        </div>

        <!-- 댓글 섹션 -->
        <div class="disqus-container">
            <h2>💬 댓글 남기기</h2>
            <div id="disqus_thread"></div>
            <script>
                /**
                *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
                *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
                /*
                var disqus_config = function () {
                this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
                this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
                };
                */
                (function() { // DON'T EDIT BELOW THIS LINE
                var d = document, s = d.createElement('script');
                s.src = 'https://abc077e.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
