<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인생역전! 로또 & 동물상 테스트</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <button id="theme-toggle" aria-label="테마 전환">
        <i class="fas fa-moon"></i>
    </button>

    <div class="main-wrapper">
        <!-- 동물상 테스트 섹션 -->
        <div class="container animal-test-container">
            <h1>🐶 인공지능 동물상 테스트</h1>
            <p class="subtitle">사진을 업로드하여 나와 닮은 동물을 찾아보세요!</p>
            
            <div class="upload-section">
                <input type="file" id="image-upload" accept="image/*" style="display:none;">
                <label for="image-upload" id="upload-label">
                    <i class="fas fa-cloud-upload-alt"></i> 사진 업로드하기
                </label>
            </div>
            
            <div id="image-preview-container">
                <img id="image-preview" src="#" alt="미리보기" style="display:none;">
            </div>
            
            <div id="label-container"></div>
            <div id="loading-message" style="display:none;">AI가 사진을 분석하는 중입니다...</div>
        </div>

        <!-- 로또 추첨기 섹션 -->
        <div class="container">
            <h1>🍀 로또 번호 추첨기</h1>
            <div class="numbers-container">
                <div class="number-circle">?</div>
                <div class="number-circle">?</div>
                <div class="number-circle">?</div>
                <div class="number-circle">?</div>
                <div class="number-circle">?</div>
                <div class="number-circle">?</div>
            </div>
            <button id="generate-btn">번호 추첨하기</button>
        </div>

        <!-- 제휴 문의 섹션 -->
        <div class="contact-container">
            <h2>🤝 제휴 및 비즈니스 문의</h2>
            <p>협업이나 광고 제안은 아래 폼을 통해 남겨주세요.</p>
            <form action="https://formspree.io/f/xqegylep" method="POST" id="contact-form">
                <div class="form-group">
                    <label for="name">성함/업체명</label>
                    <input type="text" id="name" name="name" placeholder="이름을 입력하세요" required>
                </div>
                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" id="email" name="_replyto" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" rows="4" placeholder="문의 내용을 입력해 주세요" required></textarea>
                </div>
                <input type="text" name="_gotcha" style="display:none">
                <button type="submit" id="submit-btn">문의 보내기</button>
            </form>
        </div>

        <!-- 댓글 섹션 -->
        <div class="disqus-container">
            <h2>💬 댓글 남기기</h2>
            <div id="disqus_thread"></div>
            <script>
                (function() {
                var d = document, s = d.createElement('script');
                s.src = 'https://abc077e.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
